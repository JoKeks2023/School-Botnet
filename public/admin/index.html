<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <h1>Admin Dashboard</h1>

      <section class="panel" id="loginPanel">
        <h2>Admin Login</h2>
        <label>
          Passwort
          <input id="adminPassword" type="password" placeholder="ADMIN_PASSWORD" />
        </label>
        <button id="loginBtn">Einloggen</button>
        <p id="loginMsg" class="muted"></p>
      </section>

      <section class="panel" id="controlPanel" style="display:none;">
        <h2>Steuerung</h2>
        <div class="row">
          <button id="createRoomBtn">Neuen Raum erstellen</button>
          <button class="secondary" id="issueCodeBtn">8-stelligen Client-Code erzeugen</button>
        </div>
        <div class="row" style="margin-top:8px;">
          <button id="createTaskBtn">Demo-Task starten (200 Chunks)</button>
          <button class="danger" id="stopTasksBtn">Laufende Tasks stoppen</button>
        </div>
        <p class="small muted">Active Room: <span id="activeRoom" class="code">-</span></p>
      </section>

      <section class="panel" id="displayPanel" style="display:none;">
        <h2>Display / Licht</h2>
        <div class="row">
          <label>
            Farbe
            <input id="solidColorInput" type="color" value="#00ff66" />
          </label>
          <button id="setSolidBtn">Solid an alle senden</button>
          <button class="secondary" id="displayOffBtn">Display aus</button>
        </div>
        <label>
          Sequenz JSON (z.B. [{"color":"#ff0000","durationMs":400},{"color":"#0000ff","durationMs":400}])
          <textarea id="sequenceInput" rows="4">[{"color":"#ff0000","durationMs":400},{"color":"#00ff00","durationMs":400},{"color":"#0000ff","durationMs":400}]</textarea>
        </label>
        <button id="setSequenceBtn">Sequenz starten</button>
        <hr />
        <label>
          Snake-Laenge (in Screens)
          <input id="snakeLengthInput" type="number" min="1" max="512" value="8" />
        </label>
        <label>
          Snake-Geschwindigkeit (ms pro Schritt)
          <input id="snakeSpeedInput" type="number" min="60" max="10000" value="220" />
        </label>
        <label>
          Snake-Farbpalette JSON (z.B. ["#ffffff","#00ffff","#000000"])
          <textarea id="snakePaletteInput" rows="3">["#ffffff","#00ffff","#0000ff","#000000"]</textarea>
        </label>
        <button id="setSnakeBtn">Snake starten (ueber mehrere Screens)</button>
      </section>

      <section class="panel" id="pythonPanel" style="display:none;">
        <h2>Python Compute Task</h2>
        <label>
          Chunks
          <input id="pythonChunksInput" type="number" min="1" max="5000" value="40" />
        </label>
        <label>
          Python Script (muss compute(chunk_index, total_chunks) definieren)
          <textarea id="pythonScriptInput" rows="12">def compute(chunk_index, total_chunks):
    # Beispiel: synthetische Berechnung
    acc = 0
    for i in range(10000 + chunk_index * 10):
        acc += (i % 13)
    return {
        "chunk_index": chunk_index,
        "total_chunks": total_chunks,
        "checksum": acc
    }</textarea>
        </label>
        <button id="createPythonTaskBtn">Python Task starten</button>
      </section>

      <section class="panel" id="codesPanel" style="display:none;">
        <h2>Join-Codes</h2>
        <p>Raumcode: <span id="roomCodeText" class="code">-</span></p>
        <p>Letzter Einmalcode: <span id="lastCodeText" class="code">-</span></p>
      </section>

      <section class="panel" id="statusPanel" style="display:none;">
        <h2>Live Status</h2>
        <div class="grid">
          <div>
            <h3>Clients</h3>
            <ul id="clientsList"></ul>
          </div>
          <div>
            <h3>Tasks</h3>
            <ul id="tasksList"></ul>
          </div>
          <div>
            <h3>Offene Einmalcodes</h3>
            <ul id="pendingCodesList"></ul>
          </div>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/admin/app.js"></script>
  </body>
</html>
