<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom Cluster – Node</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #0f0;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── Canvas (Display mode) ─────────────────────────────── */
    #visualCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
    }

    /* ── Headless terminal view ────────────────────────────── */
    #headlessView {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #btopBox {
      border: 1px solid #0f0;
      padding: 16px 24px;
      min-width: 400px;
      background: rgba(0, 20, 0, 0.85);
    }

    #btopBox pre {
      font-size: 13px;
      line-height: 1.6;
      color: #0f0;
      white-space: pre;
    }

    /* ── Display-mode overlay ──────────────────────────────── */
    #displayOverlay {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(0, 255, 0, 0.4);
      color: #0f0;
      font-size: 12px;
      padding: 8px 12px;
      min-width: 230px;
      line-height: 1.7;
      display: none;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Idle message ──────────────────────────────────────── */
    #idleMsg {
      position: absolute;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      color: #003300;
      font-size: 11px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <!-- Display mode: full-screen canvas -->
  <canvas id="visualCanvas"></canvas>

  <!-- Display mode: overlay stats -->
  <div id="displayOverlay">
    <div id="overlayContent">Connecting…</div>
  </div>

  <!-- Headless mode: btop-style box -->
  <div id="headlessView">
    <div id="btopBox">
      <pre id="btopText">Connecting to cluster…</pre>
    </div>
  </div>

  <div id="idleMsg">CLASSROOM CLUSTER NODE · Waiting for jobs…</div>

  <script src="renderer.js"></script>
</body>
</html>
